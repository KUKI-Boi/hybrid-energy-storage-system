<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <rect width="800" height="600" fill="#090c10" />
    
    <!-- Grid pattern -->
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
        <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    <rect width="800" height="600" fill="url(#grid)" />
    
    <!-- Neon horizon line -->
    <line x1="0" y1="400" x2="800" y2="400" stroke="#1f6feb" stroke-width="2" opacity="0.6" filter="drop-shadow(0 0 4px #1f6feb)" />
    
    <!-- Moving road line -->
    <rect x="0" y="550" width="800" height="50" fill="#161b22" />
    <line x1="0" y1="550" x2="800" y2="550" stroke="#30363d" stroke-width="4" />
    <line x1="0" y1="600" x2="800" y2="600" stroke="#30363d" stroke-width="4" />
    
    <!-- Road dashed lines (animated by offset in JS) -->
    <line x1="0" y1="575" x2="800" y2="575" stroke="#8b949e" stroke-width="4" stroke-dasharray="40 60" />

    <!-- Background Buildings/Abstract shapes -->
    <g opacity="0.3" fill="#161b22" stroke="#30363d" stroke-width="2">
        <polygon points="50,400 100,200 150,400" />
        <rect x="250" y="250" width="100" height="150" />
        <polygon points="450,400 550,150 650,400" />
        <rect x="700" y="300" width="80" height="100" />
    </g>
</svg>
